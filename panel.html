<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DESMO — Panel de Pedidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    @media print {
      body > *:not(#pdfArea) { display: none !important; }
      #pdfArea { display: block !important; position: fixed; inset: 0; background: #fff; color: #000; padding: 2rem; font-family: 'Lato', sans-serif; }
      #pdfArea * { color: #000 !important; border-color: #ccc !important; background: transparent !important; }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e8d5a0; font-family: 'Lato', sans-serif; min-height: 100vh; }

    /* LOGIN */
    #loginScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    .login-box { background:#111; border:1px solid #2a1e00; border-radius:6px; padding:2.5rem 2rem; width:100%; max-width:360px; text-align:center; }
    .login-logo { font-family:'Cinzel',serif; font-size:2rem; color:#c9a227; letter-spacing:8px; }
    .login-sub { font-size:0.65rem; color:#5a4a10; letter-spacing:3px; text-transform:uppercase; margin-top:4px; margin-bottom:2rem; }
    .login-input { width:100%; background:#0a0a0a; border:1px solid #2a1e00; border-radius:2px; padding:0.7rem 1rem; color:#e8d5a0; font-family:'Lato',sans-serif; font-size:0.9rem; outline:none; margin-bottom:0.8rem; transition:border-color 0.2s; }
    .login-input:focus { border-color:#c9a227; }
    .login-btn { width:100%; background:#c9a227; color:#0a0a0a; border:none; padding:0.85rem; font-family:'Cinzel',serif; font-size:0.85rem; letter-spacing:3px; cursor:pointer; border-radius:2px; }
    .login-error { color:#dc4a4a; font-size:0.72rem; margin-top:0.5rem; display:none; }

    /* PANEL */
    #panelScreen { display:none; }
    header { background:#0a0a0a; border-bottom:1px solid #b8972a; padding:1rem 1.2rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:50; }
    .logo { font-family:'Cinzel',serif; font-size:1.2rem; color:#c9a227; letter-spacing:6px; }
    .sub { font-size:0.58rem; color:#5a4a10; letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
    .header-right { display:flex; gap:8px; }
    .icon-btn { background:none; border:1px solid #3a2a08; color:#7a6520; font-size:0.65rem; letter-spacing:1.5px; text-transform:uppercase; padding:6px 10px; cursor:pointer; border-radius:2px; font-family:'Lato',sans-serif; transition:all 0.2s; }
    .icon-btn:hover { border-color:#c9a227; color:#c9a227; }

    .stats-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#1a1200; border-bottom:1px solid #1a1200; }
    .stat { padding:0.85rem; text-align:center; background:#111; }
    .stat-num { font-family:'Cinzel',serif; font-size:1.3rem; color:#c9a227; }
    .stat-num.pulse { animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .stat-label { font-size:0.58rem; color:#5a4a10; letter-spacing:2px; text-transform:uppercase; margin-top:2px; }

    .filters { display:flex; gap:6px; padding:0.8rem 1rem; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid #1a1200; }
    .filters::-webkit-scrollbar { display:none; }
    .filter-btn { flex-shrink:0; padding:5px 14px; border:1px solid #3a2a08; background:transparent; color:#7a6520; font-family:'Lato',sans-serif; font-size:0.65rem; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; border-radius:2px; transition:all 0.2s; }
    .filter-btn.active { background:#c9a227; color:#0a0a0a; border-color:#c9a227; font-weight:700; }

    .pedidos-list { padding:0.8rem 1rem 2rem; }
    .empty-state { text-align:center; padding:4rem 1rem; color:#3a2a08; font-size:0.8rem; letter-spacing:2px; }
    .empty-icon { font-size:2.5rem; margin-bottom:1rem; opacity:0.3; }

    .pedido-card { background:#111; border:1px solid #1e1600; border-radius:4px; margin-bottom:10px; overflow:hidden; }
    .pedido-card.pendiente { border-left:3px solid #c9a227; }
    .pedido-card.aceptado  { border-left:3px solid #2a8c2a; }
    .pedido-card.rechazado { border-left:3px solid #8c2a2a; opacity:0.55; }
    .pedido-header { padding:0.85rem 1rem; display:flex; justify-content:space-between; align-items:flex-start; cursor:pointer; }
    .pedido-meta { font-size:0.58rem; color:#5a4a10; letter-spacing:2px; text-transform:uppercase; }
    .pedido-cliente { font-family:'Cinzel',serif; font-size:0.9rem; color:#d4b86a; margin-top:3px; }
    .pedido-dir { font-size:0.65rem; color:#4a3a10; margin-top:2px; }
    .pedido-right { text-align:right; flex-shrink:0; margin-left:0.5rem; }
    .pedido-total { font-family:'Cinzel',serif; font-size:1.1rem; color:#c9a227; }
    .estado-pill { font-size:0.58rem; letter-spacing:1.5px; text-transform:uppercase; padding:2px 8px; border-radius:10px; margin-top:4px; display:inline-block; }
    .estado-pill.pendiente { background:#2a1e00; color:#c9a227; }
    .estado-pill.aceptado  { background:#0a1e0a; color:#4adc4a; }
    .estado-pill.rechazado { background:#1e0a0a; color:#dc4a4a; }
    .pedido-body { display:none; padding:0 1rem 1rem; border-top:1px solid #1a1400; animation:fadeIn 0.2s ease; }
    .pedido-body.open { display:block; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .items-table { margin-top:0.8rem; }
    .item-row { display:flex; justify-content:space-between; font-size:0.7rem; padding:4px 0; border-bottom:1px solid #1a1400; color:#a08040; }
    .item-row:last-child { border:none; }
    .item-row .sub { color:#c9a227; font-weight:700; }
    .total-row { display:flex; justify-content:space-between; margin-top:0.8rem; padding-top:0.6rem; border-top:1px solid #b8972a44; }
    .total-row .lbl { font-size:0.68rem; color:#7a6520; letter-spacing:2px; text-transform:uppercase; }
    .total-row .val { font-family:'Cinzel',serif; color:#c9a227; font-size:1.05rem; }
    .action-row { display:flex; gap:8px; margin-top:1rem; }
    .btn-ok  { flex:1; background:#1a3a1a; border:1px solid #2a6a2a; color:#4adc4a; padding:0.6rem; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:2px; font-family:'Lato',sans-serif; }
    .btn-no  { flex:1; background:#3a1a1a; border:1px solid #6a2a2a; color:#dc4a4a; padding:0.6rem; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:2px; font-family:'Lato',sans-serif; }
    .btn-wsp { flex:1; background:#0a2000; border:1px solid #1a5000; color:#4adc4a; padding:0.6rem; font-size:0.68rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border-radius:2px; font-family:'Lato',sans-serif; }

    /* MODALES */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:300; align-items:flex-end; justify-content:center; }
    .overlay.show { display:flex; }
    .modal { background:#111; border:1px solid #2a1e00; border-radius:8px 8px 0 0; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; padding:1.5rem 1.2rem 2rem; animation:slideUp 0.28s ease; }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-title { font-family:'Cinzel',serif; font-size:1rem; color:#c9a227; letter-spacing:3px; text-align:center; margin-bottom:1.2rem; text-transform:uppercase; }
    .close-btn { float:right; background:none; border:none; color:#7a6520; font-size:1.3rem; cursor:pointer; }

    /* CIERRE DE CAJA */
    .caja-stat { background:#0d0a00; border:1px solid #2a1e00; border-radius:3px; padding:0.9rem 1rem; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
    .caja-stat-label { font-size:0.68rem; color:#7a6520; letter-spacing:1.5px; text-transform:uppercase; }
    .caja-stat-val { font-family:'Cinzel',serif; font-size:1.2rem; color:#c9a227; }
    .caja-section-title { font-size:0.65rem; color:#5a4a10; letter-spacing:2px; text-transform:uppercase; margin:1rem 0 0.5rem; }
    .caja-row { display:flex; justify-content:space-between; font-size:0.72rem; color:#a08040; padding:5px 0; border-bottom:1px solid #1a1400; }
    .caja-row:last-child { border:none; }
    .caja-row .cv { color:#c9a227; }

    .warn-box { background:#1a0a00; border:1px solid #6a2a00; border-left:3px solid #c9a227; padding:0.85rem 1rem; border-radius:2px; margin:1rem 0; font-size:0.73rem; color:#d4a060; line-height:1.7; }
    .warn-box strong { display:block; color:#c9a227; margin-bottom:4px; font-size:0.75rem; letter-spacing:1px; text-transform:uppercase; }

    .btn-cerrar-caja { width:100%; background:#c9a227; color:#0a0a0a; border:none; padding:0.9rem; font-family:'Cinzel',serif; font-size:0.85rem; letter-spacing:3px; cursor:pointer; border-radius:2px; margin-top:0.5rem; text-transform:uppercase; }
    .btn-cerrar-caja:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-imagen { width:100%; background:#1a1400; border:1px solid #3a2a08; color:#c9a227; padding:0.75rem; font-family:'Lato',sans-serif; font-size:0.72rem; letter-spacing:2px; cursor:pointer; border-radius:2px; margin-top:0.5rem; text-transform:uppercase; }
    .btn-cancelar { width:100%; background:transparent; color:#5a4a10; border:1px solid #2a1e00; padding:0.7rem; font-family:'Lato',sans-serif; font-size:0.72rem; letter-spacing:2px; cursor:pointer; border-radius:2px; margin-top:0.5rem; text-transform:uppercase; }

    /* HISTORIAL */
    .historial-item { background:#0d0a00; border:1px solid #2a1e00; border-radius:3px; padding:0.9rem 1rem; margin-bottom:8px; cursor:pointer; transition:border-color 0.2s; }
    .historial-item:hover { border-color:#c9a227; }
    .hist-fecha { font-family:'Cinzel',serif; font-size:0.85rem; color:#d4b86a; }
    .hist-meta { font-size:0.65rem; color:#5a4a10; margin-top:3px; letter-spacing:1px; }
    .hist-total { font-family:'Cinzel',serif; font-size:1.1rem; color:#c9a227; float:right; }

    /* IMAGEN PREVIEW */
    #imgOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:500; flex-direction:column; align-items:center; justify-content:center; padding:1rem; }
    #imgOverlay.show { display:flex; }
    #imgOverlay img { max-width:100%; max-height:80vh; border-radius:4px; }
    .img-actions { display:flex; gap:10px; margin-top:1rem; }
    .img-download { background:#c9a227; color:#0a0a0a; border:none; padding:0.7rem 1.4rem; font-family:'Cinzel',serif; font-size:0.8rem; letter-spacing:2px; cursor:pointer; border-radius:2px; text-transform:uppercase; }
    .img-close { background:transparent; color:#7a6520; border:1px solid #3a2a08; padding:0.7rem 1.4rem; font-family:'Lato',sans-serif; font-size:0.72rem; letter-spacing:2px; cursor:pointer; border-radius:2px; text-transform:uppercase; }

    /* CANVAS PARA IMAGEN (oculto) */
    #cajaCanvas { position:fixed; left:-9999px; top:0; background:#0a0a0a; padding:2rem; width:420px; color:#e8d5a0; font-family:'Lato',sans-serif; }

    /* NOTIFICACIÓN */
    .notif-banner { position:fixed; top:0; left:0; right:0; background:#c9a227; color:#0a0a0a; padding:0.9rem 1.2rem; display:flex; align-items:center; justify-content:space-between; z-index:999; transform:translateY(-100%); transition:transform 0.4s ease; }
    .notif-banner.show { transform:translateY(0); }
    .notif-text { font-family:'Cinzel',serif; font-size:0.85rem; letter-spacing:1px; }
    .notif-close { background:none; border:none; font-size:1.2rem; cursor:pointer; color:#0a0a0a; }
  </style>
</head>
<body>

<!-- NOTIFICACIÓN BANNER -->
<div class="notif-banner" id="notifBanner">
  <div class="notif-text" id="notifText">🛒 Nuevo pedido</div>
  <button class="notif-close" onclick="cerrarNotif()">✕</button>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">DESMO</div>
    <div class="login-sub">Panel de pedidos</div>
    <input class="login-input" id="loginPass" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Entrar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div id="panelScreen">
  <header>
    <div>
      <div class="logo">DESMO</div>
      <div class="sub">Panel · Chancay 24/7</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="abrirHistorial()">📁 Historial</button>
      <button class="icon-btn" onclick="abrirCaja()">💰 Cerrar caja</button>
      <button class="icon-btn" onclick="logout()">Salir</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num pulse" id="statPend">0</div><div class="stat-label">Pendientes</div></div>
    <div class="stat"><div class="stat-num" id="statAcep">0</div><div class="stat-label">Aceptados</div></div>
    <div class="stat"><div class="stat-num" id="statVentas">S/.0</div><div class="stat-label">Total activo</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFiltro('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFiltro('pendiente',this)">Pendientes</button>
    <button class="filter-btn" onclick="setFiltro('aceptado',this)">Aceptados</button>
    <button class="filter-btn" onclick="setFiltro('rechazado',this)">Rechazados</button>
  </div>

  <div class="pedidos-list" id="pedidosList">
    <div class="empty-state"><div class="empty-icon">📋</div>Cargando...</div>
  </div>
</div>

<!-- MODAL CIERRE DE CAJA -->
<div class="overlay" id="cajaOverlay">
  <div class="modal">
    <button class="close-btn" onclick="cerrarModal('cajaOverlay')">✕</button>
    <div class="modal-title">💰 Cerrar Caja</div>
    <div id="cajaContenido"></div>
    <div id="cajaBotones"></div>
  </div>
</div>

<!-- MODAL HISTORIAL -->
<div class="overlay" id="historialOverlay">
  <div class="modal">
    <button class="close-btn" onclick="cerrarModal('historialOverlay')">✕</button>
    <div class="modal-title">📁 Historial de Cierres</div>
    <div id="historialContenido"></div>
  </div>
</div>



<!-- DIV PARA PDF (oculto hasta imprimir) -->
<div id="pdfArea" style="display:none;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, push, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

  const VAPID_KEY = "BJmK-gbLjHmR4RjsolyhDQSSDQGXODhfvb2zMp3rMzt1uPBlQrJv9gjPjdWhNcbOwpTH3lSWofUEYEEXNWd4aQQ";

  const app = initializeApp({
    apiKey: "AIzaSyB7gYAmy_DNY8lJMjXMyekvbuAsqcIisr8",
    authDomain: "desmo-carta.firebaseapp.com",
    projectId: "desmo-carta",
    storageBucket: "desmo-carta.firebasestorage.app",
    messagingSenderId: "776883046319",
    appId: "1:776883046319:web:724b812cde1b3ec32ad15a",
    databaseURL: "https://desmo-carta-default-rtdb.firebaseio.com"
  });
  const db = getDatabase(app);
  const messaging = getMessaging(app);

  let pedidos = {};
  let filtro = 'todos';
  let iniciado = false;
  let prevPend = 0;

  // Registrar service worker y obtener token FCM
  async function activarFCM() {
    try {
      if (!('serviceWorker' in navigator)) return;

      // Registrar el service worker
      const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

      // Pedir permiso de notificaciones
      const permiso = await Notification.requestPermission();
      if (permiso !== 'granted') {
        console.warn('Notificaciones no permitidas');
        return;
      }

      // Obtener token FCM
      const token = await getToken(messaging, {
        vapidKey: VAPID_KEY,
        serviceWorkerRegistration: reg
      });

      if (token) {
        // Guardar token en Firebase para poder enviarte notificaciones
        await push(ref(db, 'fcm_tokens'), {
          token,
          fecha: new Date().toISOString()
        });
        console.log('FCM activo ✓');
      }

      // Notificaciones cuando el panel está ABIERTO
      onMessage(messaging, (payload) => {
        const titulo = payload.notification?.title || '🛒 DESMO';
        const cuerpo = payload.notification?.body  || 'Nuevo pedido recibido';
        mostrarNotif(titulo + ' — ' + cuerpo);
        sonarNotif();
      });

    } catch(e) {
      console.error('FCM error:', e);
    }
  }

  window.iniciarPanel = () => {
    activarFCM();
    onValue(ref(db, 'pedidos'), snap => {
      pedidos = snap.val() || {};
      const pend = Object.values(pedidos).filter(p => p.estado === 'pendiente').length;
      if (iniciado && pend > prevPend) { mostrarNotif('🛒 ¡Nuevo pedido!'); sonarNotif(); }
      prevPend = pend;
      iniciado = true;
      renderPedidos();
    });
  };

  window._update = (id, data) => update(ref(db, 'pedidos/' + id), data);
  window._remove = id => remove(ref(db, 'pedidos/' + id));
  window._pushCierre = data => push(ref(db, 'cierres'), data);
  window._getCierres = async () => {
    const snap = await get(ref(db, 'cierres'));
    return snap.val() || {};
  };

  window.setFiltro = (f, btn) => {
    filtro = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPedidos();
  };

  function renderPedidos() {
    const ids = Object.keys(pedidos).reverse();
    const filtrados = filtro === 'todos' ? ids : ids.filter(id => pedidos[id].estado === filtro);
    const pend = ids.filter(id => pedidos[id].estado === 'pendiente').length;
    const acep = ids.filter(id => pedidos[id].estado === 'aceptado').length;
    const totalActivo = ids.filter(id => pedidos[id].estado === 'aceptado').reduce((s,id) => s + (pedidos[id].total||0), 0);

    document.getElementById('statPend').textContent = pend;
    document.getElementById('statAcep').textContent = acep;
    document.getElementById('statVentas').textContent = 'S/.' + totalActivo;

    const lista = document.getElementById('pedidosList');
    if (filtrados.length === 0) {
      lista.innerHTML = `<div class="empty-state"><div class="empty-icon">🥃</div>No hay pedidos${filtro !== 'todos' ? ' ' + filtro + 's' : ''}</div>`;
      return;
    }

    lista.innerHTML = filtrados.map(id => {
      const p = pedidos[id];
      const fecha = new Date(p.fecha);
      const hora = fecha.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
      const dia  = fecha.toLocaleDateString('es-PE',{day:'2-digit',month:'short'});
      const itemsHtml = (p.items||[]).map(i =>
        `<div class="item-row"><span>${i.cantidad}× ${i.nombre}</span><span class="sub">S/.${i.subtotal}</span></div>`
      ).join('');
      const acciones = p.estado === 'pendiente'
        ? `<div class="action-row">
            <button class="btn-ok" onclick="aceptar('${id}','${p.cliente?.celular}','${p.cliente?.nombre}',${p.total})">✓ Aceptar</button>
            <button class="btn-no" onclick="rechazar('${id}')">✗ Rechazar</button>
           </div>`
        : p.estado === 'aceptado'
        ? `<div class="action-row">
            <button class="btn-wsp" onclick="wspCliente('${p.cliente?.celular}','${p.cliente?.nombre}',${p.total})">💬 Confirmar por WhatsApp</button>
           </div>`
        : '';
      return `
        <div class="pedido-card ${p.estado}">
          <div class="pedido-header" onclick="toggleBody('${id}')">
            <div>
              <div class="pedido-meta">${dia} · ${hora}</div>
              <div class="pedido-cliente">${p.cliente?.nombre||'—'}</div>
              <div class="pedido-dir">${p.cliente?.celular||''} · ${p.cliente?.direccion||''}</div>
            </div>
            <div class="pedido-right">
              <div class="pedido-total">S/.${p.total}</div>
              <div class="estado-pill ${p.estado}">${p.estado}</div>
            </div>
          </div>
          <div class="pedido-body" id="body-${id}">
            <div class="items-table">${itemsHtml}</div>
            <div class="total-row"><div class="lbl">Total</div><div class="val">S/.${p.total}</div></div>
            ${acciones}
          </div>
        </div>`;
    }).join('');
  }

  window.toggleBody = id => document.getElementById('body-' + id)?.classList.toggle('open');

  window.aceptar = async (id, celular, nombre, total) => {
    await window._update(id, { estado: 'aceptado' });
    wspCliente(celular, nombre, total);
  };

  window.rechazar = async id => {
    if (confirm('¿Rechazar este pedido?')) await window._update(id, { estado: 'rechazado' });
  };

  window.wspCliente = (celular, nombre, total) => {
    const num = (celular||'').replace(/\D/g,'');
    const msg = `✅ *Hola ${nombre}!*\n\nTu pedido fue *confirmado* 🎉\n💰 Total: *S/.${total}*\n\nEstamos preparando todo. Te avisamos cuando estemos en camino.\n\n— *DESMO* 🥃`;
    window.open('https://wa.me/51' + num + '?text=' + encodeURIComponent(msg), '_blank');
  };

  // ====== CIERRE DE CAJA ======
  window.abrirCaja = () => {
    const ids = Object.keys(pedidos);
    const total = ids.filter(id => pedidos[id].estado === 'aceptado').reduce((s,id) => s + (pedidos[id].total||0), 0);
    const pend  = ids.filter(id => pedidos[id].estado === 'pendiente').length;
    const acep  = ids.filter(id => pedidos[id].estado === 'aceptado').length;
    const rech  = ids.filter(id => pedidos[id].estado === 'rechazado').length;

    // Ranking de productos
    const conteo = {};
    ids.filter(id => pedidos[id].estado === 'aceptado').forEach(id => {
      (pedidos[id].items||[]).forEach(i => { conteo[i.nombre] = (conteo[i.nombre]||0) + i.cantidad; });
    });
    const ranking = Object.entries(conteo).sort((a,b)=>b[1]-a[1]);

    const fechaStr = new Date().toLocaleDateString('es-PE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    const horaStr  = new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});

    document.getElementById('cajaContenido').innerHTML = `
      <div style="font-size:0.62rem;color:#5a4a10;letter-spacing:2px;text-align:center;margin-bottom:1rem;text-transform:uppercase;">${fechaStr} · ${horaStr}</div>

      <div class="caja-stat"><div class="caja-stat-label">Total a cobrar</div><div class="caja-stat-val" style="color:#4adc4a;">S/.${total}</div></div>
      <div class="caja-stat"><div class="caja-stat-label">Pedidos aceptados</div><div class="caja-stat-val">${acep}</div></div>
      <div class="caja-stat"><div class="caja-stat-label">Pedidos rechazados</div><div class="caja-stat-val" style="color:#dc4a4a;">${rech}</div></div>
      ${pend > 0 ? `<div class="caja-stat"><div class="caja-stat-label" style="color:#c9a227;">⚠ Pedidos pendientes</div><div class="caja-stat-val" style="color:#c9a227;">${pend}</div></div>` : ''}

      ${ranking.length > 0 ? `
        <div class="caja-section-title">Productos más pedidos</div>
        ${ranking.map(([n,c]) => `<div class="caja-row"><span>${n}</span><span class="cv">${c} unid</span></div>`).join('')}
      ` : ''}

      ${acep > 0 ? `
        <div class="caja-section-title">Pedidos aceptados</div>
        ${ids.filter(id=>pedidos[id].estado==='aceptado').map(id => {
          const p = pedidos[id];
          const h = new Date(p.fecha).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
          return `<div class="caja-row"><span>${h} · ${p.cliente?.nombre}</span><span class="cv">S/.${p.total}</span></div>`;
        }).join('')}
      ` : ''}

      ${pend > 0 ? `<div class="warn-box"><strong>⚠ Atención</strong>Tienes ${pend} pedido(s) pendiente(s). Si cierras la caja se incluirán en el archivo pero serán eliminados del panel.</div>` : ''}
    `;

    document.getElementById('cajaBotones').innerHTML = `
      <button class="btn-imagen" onclick="generarPDF(window.getPedidos(),${total},${acep},${rech},null)">📄 Ver PDF del cierre (opcional)</button>
      <button class="btn-cerrar-caja" id="btnConfCierre" onclick="confirmarCierre(${total},${acep},${rech})">✓ Confirmar cierre de caja</button>
      <button class="btn-cancelar" onclick="cerrarModal('cajaOverlay')">Cancelar</button>
    `;

    document.getElementById('cajaOverlay').classList.add('show');
  };

  window.confirmarCierre = async (total, acep, rech) => {
    const btn = document.getElementById('btnConfCierre');
    btn.disabled = true;
    btn.textContent = 'Archivando...';

    const ids = Object.keys(pedidos);
    const fechaCierre = new Date().toISOString();

    // Guardar cierre en Firebase
    await window._pushCierre({
      fecha: fechaCierre,
      total,
      pedidosAceptados: acep,
      pedidosRechazados: rech,
      pedidos: pedidos // guarda snapshot completo
    });

    // Eliminar todos los pedidos actuales
    for (const id of ids) {
      await window._remove(id);
    }

    cerrarModal('cajaOverlay');
  };

  // Generar PDF del resumen
  window.generarPDF = (pedidosList, total, acep, rech, fechaISO) => {
    const fecha = fechaISO ? new Date(fechaISO) : new Date();
    const fechaStr = fecha.toLocaleDateString('es-PE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    const horaStr  = fecha.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});

    const conteo = {};
    Object.values(pedidosList).filter(p=>p.estado==='aceptado').forEach(p=>{
      (p.items||[]).forEach(i=>{conteo[i.nombre]=(conteo[i.nombre]||0)+i.cantidad;});
    });
    const ranking = Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
    const aceptados = Object.values(pedidosList).filter(p=>p.estado==='aceptado');

    document.getElementById('pdfArea').innerHTML = `
      <div style="max-width:700px;margin:0 auto;">
        <div style="text-align:center;border-bottom:2px solid #000;padding-bottom:1rem;margin-bottom:1.5rem;">
          <div style="font-size:2rem;font-weight:700;letter-spacing:8px;">DESMO</div>
          <div style="font-size:0.75rem;letter-spacing:4px;margin-top:4px;">LICORERÍA · CHANCAY · 24/7</div>
          <div style="font-size:0.85rem;margin-top:0.5rem;font-weight:700;">CIERRE DE CAJA</div>
          <div style="font-size:0.8rem;margin-top:4px;">${fechaStr} · ${horaStr}</div>
        </div>

        <table style="width:100%;border-collapse:collapse;margin-bottom:1.5rem;">
          <tr style="background:#f0f0f0;">
            <td style="padding:8px 12px;font-size:0.8rem;font-weight:700;">TOTAL RECAUDADO</td>
            <td style="padding:8px 12px;font-size:1.1rem;font-weight:700;text-align:right;">S/.${total}</td>
          </tr>
          <tr>
            <td style="padding:6px 12px;font-size:0.78rem;">Pedidos aceptados</td>
            <td style="padding:6px 12px;font-size:0.78rem;text-align:right;">${acep}</td>
          </tr>
          <tr style="background:#f9f9f9;">
            <td style="padding:6px 12px;font-size:0.78rem;">Pedidos rechazados</td>
            <td style="padding:6px 12px;font-size:0.78rem;text-align:right;">${rech}</td>
          </tr>
        </table>

        ${ranking.length > 0 ? `
          <div style="font-weight:700;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:0.5rem;border-bottom:1px solid #ccc;padding-bottom:4px;">Productos más pedidos</div>
          <table style="width:100%;border-collapse:collapse;margin-bottom:1.5rem;">
            ${ranking.map(([n,c],i)=>`
              <tr style="background:${i%2===0?'#f9f9f9':'#fff'};">
                <td style="padding:5px 12px;font-size:0.78rem;">${i+1}. ${n}</td>
                <td style="padding:5px 12px;font-size:0.78rem;text-align:right;font-weight:700;">${c} unid</td>
              </tr>`).join('')}
          </table>
        ` : ''}

        ${aceptados.length > 0 ? `
          <div style="font-weight:700;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:0.5rem;border-bottom:1px solid #ccc;padding-bottom:4px;">Detalle de pedidos aceptados</div>
          <table style="width:100%;border-collapse:collapse;margin-bottom:1.5rem;">
            <thead>
              <tr style="background:#eee;">
                <th style="padding:6px 12px;font-size:0.75rem;text-align:left;">Hora</th>
                <th style="padding:6px 12px;font-size:0.75rem;text-align:left;">Cliente</th>
                <th style="padding:6px 12px;font-size:0.75rem;text-align:left;">Dirección</th>
                <th style="padding:6px 12px;font-size:0.75rem;text-align:left;">Productos</th>
                <th style="padding:6px 12px;font-size:0.75rem;text-align:right;">Total</th>
              </tr>
            </thead>
            <tbody>
              ${aceptados.map((p,i)=>{
                const h = new Date(p.fecha).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
                const prods = (p.items||[]).map(it=>`${it.cantidad}× ${it.nombre}`).join(', ');
                return `<tr style="background:${i%2===0?'#f9f9f9':'#fff'};">
                  <td style="padding:5px 12px;font-size:0.75rem;">${h}</td>
                  <td style="padding:5px 12px;font-size:0.75rem;">${p.cliente?.nombre||'—'}</td>
                  <td style="padding:5px 12px;font-size:0.75rem;">${p.cliente?.direccion||'—'}</td>
                  <td style="padding:5px 12px;font-size:0.75rem;">${prods}</td>
                  <td style="padding:5px 12px;font-size:0.75rem;text-align:right;font-weight:700;">S/.${p.total}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : ''}

        <div style="text-align:center;border-top:1px solid #ccc;padding-top:0.8rem;font-size:0.7rem;color:#666;">
          DESMO Licorería · Chancay · Generado el ${fechaStr} a las ${horaStr}
        </div>
      </div>
    `;

    document.getElementById('pdfArea').style.display = 'block';
    setTimeout(() => {
      window.print();
      setTimeout(() => { document.getElementById('pdfArea').style.display = 'none'; }, 500);
    }, 200);
  };

  // HISTORIAL DE CIERRES
  window.abrirHistorial = async () => {
    const cierres = await window._getCierres();
    const ids = Object.keys(cierres).reverse();
    const cont = document.getElementById('historialContenido');

    if (ids.length === 0) {
      cont.innerHTML = '<div class="empty-state"><div class="empty-icon">📁</div>Aún no hay cierres registrados</div>';
    } else {
      cont.innerHTML = ids.map(id => {
        const c = cierres[id];
        const fecha = new Date(c.fecha);
        const fechaStr = fecha.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
        const horaStr  = fecha.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
        return `
          <div class="historial-item" onclick="verCierre('${id}')">
            <div class="hist-total">S/.${c.total}</div>
            <div class="hist-fecha">${fechaStr} · ${horaStr}</div>
            <div class="hist-meta">${c.pedidosAceptados} aceptados · ${c.pedidosRechazados} rechazados</div>
          </div>`;
      }).join('');
    }

    document.getElementById('historialOverlay').classList.add('show');
  };

  window.verCierre = async (id) => {
    const cierres = await window._getCierres();
    const c = cierres[id];
    if (!c) return;

    const pedsCierre = c.pedidos || {};
    const ids = Object.keys(pedsCierre);
    const conteo = {};
    ids.filter(i=>pedsCierre[i].estado==='aceptado').forEach(i=>{
      (pedsCierre[i].items||[]).forEach(it=>{conteo[it.nombre]=(conteo[it.nombre]||0)+it.cantidad;});
    });
    const ranking = Object.entries(conteo).sort((a,b)=>b[1]-a[1]);
    const fechaStr = new Date(c.fecha).toLocaleDateString('es-PE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    const horaStr  = new Date(c.fecha).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});

    // Reusar modal de caja para mostrar detalle
    document.getElementById('cajaContenido').innerHTML = `
      <div style="font-size:0.62rem;color:#5a4a10;letter-spacing:2px;text-align:center;margin-bottom:1rem;text-transform:uppercase;">${fechaStr} · ${horaStr}</div>
      <div class="caja-stat"><div class="caja-stat-label">Total</div><div class="caja-stat-val" style="color:#4adc4a;">S/.${c.total}</div></div>
      <div class="caja-stat"><div class="caja-stat-label">Aceptados</div><div class="caja-stat-val">${c.pedidosAceptados}</div></div>
      <div class="caja-stat"><div class="caja-stat-label">Rechazados</div><div class="caja-stat-val" style="color:#dc4a4a;">${c.pedidosRechazados}</div></div>
      ${ranking.length > 0 ? `
        <div class="caja-section-title">Productos más pedidos</div>
        ${ranking.map(([n,ct])=>`<div class="caja-row"><span>${n}</span><span class="cv">${ct} unid</span></div>`).join('')}
      ` : ''}
      ${ids.filter(i=>pedsCierre[i].estado==='aceptado').length > 0 ? `
        <div class="caja-section-title">Pedidos</div>
        ${ids.filter(i=>pedsCierre[i].estado==='aceptado').map(i=>{
          const p = pedsCierre[i];
          const h = new Date(p.fecha).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
          return `<div class="caja-row"><span>${h} · ${p.cliente?.nombre}</span><span class="cv">S/.${p.total}</span></div>`;
        }).join('')}
      ` : ''}
    `;
    document.getElementById('cajaBotones').innerHTML = `
      <button class="btn-imagen" onclick="generarPDFCierre('${id}')">📄 Ver PDF del cierre</button>
      <button class="btn-cancelar" onclick="cerrarModal('cajaOverlay')">Cerrar</button>
    `;
    cerrarModal('historialOverlay');
    document.getElementById('cajaOverlay').classList.add('show');
  };

  window.generarPDFCierre = async (id) => {
    const cierres = await window._getCierres();
    const c = cierres[id];
    if (!c) return;
    window.generarPDF(c.pedidos || {}, c.total, c.pedidosAceptados, c.pedidosRechazados, c.fecha);
  };

  window.getPedidos = () => pedidos;
</script>

<script>
  const PASS = 'desmo2024';

  function login() {
    if (document.getElementById('loginPass').value === PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('panelScreen').style.display = 'block';
      window.iniciarPanel();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('panelScreen').style.display = 'none';
    document.getElementById('loginPass').value = '';
  }

  function cerrarModal(id) { document.getElementById(id).classList.remove('show'); }

  function mostrarNotif(msg) {
    const b = document.getElementById('notifBanner');
    document.getElementById('notifText').textContent = msg;
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 5000);
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('DESMO 🥃', { body: msg });
    }
  }

  function cerrarNotif() { document.getElementById('notifBanner').classList.remove('show'); }

  function sonarNotif() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 180, 360].forEach(d => setTimeout(() => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880;
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        o.start(); o.stop(ctx.currentTime + 0.2);
      }, d));
    } catch(e) {}
  }
</script>
</body>
